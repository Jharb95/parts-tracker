<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Parts Tracker" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Parts Order Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg:           #0f1117;
      --surface:      #1a1d27;
      --surface2:     #232733;
      --surface3:     #2c3040;
      --border:       #363b4a;
      --border-light: #434959;
      --text:         #e8eaf0;
      --text-dim:     #9498a8;
      --text-muted:   #6b7084;
      --accent:       #4a9eff;
      --accent-dim:   #2a6bc4;
      --green:        #34d399;
      --green-bg:     #1a2e28;
      --orange:       #fb923c;
      --orange-bg:    #2e2318;
      --red:          #f87171;
      --red-bg:       #2e1a1a;
      --group-shade:  #1e2130;
      --radius:       6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
      row-gap: 8px;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 18px;
      font-weight: 700;
    }
    .header-title span.diamond { color: var(--accent); }
    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      flex-wrap: wrap;
    }
    label.ctrl-label { color: var(--text-muted); font-size: 12px; }

    /* ── INPUTS GLOBAL ── */
    input, textarea, select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--text-muted); }
    select option { background: var(--surface2); }

    /* ── BUTTONS ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 7px 14px;
      transition: background .15s, color .15s;
    }
    .btn-default { background: var(--surface3); color: var(--text-dim); }
    .btn-default:hover { background: var(--border); color: var(--text); }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: var(--accent-dim); }
    .btn-add { background: #1a2e3e; color: var(--accent); }
    .btn-add:hover { background: #1f3648; }
    .btn-success { background: var(--green-bg); color: var(--green); }
    .btn-success:hover { background: #1f3b32; }
    .btn-danger { background: var(--red-bg); color: var(--red); }
    .btn-danger:hover { background: #3b1f1f; }

    /* ── MAIN LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── TABLE PANE ── */
    .table-pane {
      flex: 1;
      overflow: auto;
      min-width: 0;
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }
    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      user-select: none;
    }
    thead th:first-child { width: 52px; text-align: center; }
    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .1s;
    }
    tbody tr:hover { background: var(--surface2); }
    tbody tr.selected { background: var(--accent-dim) !important; color: #fff; }
    tbody tr.group-shade { background: var(--group-shade); }
    tbody tr.status-ordered td.status-cell { color: var(--orange); }
    tbody tr.status-received td.status-cell { color: var(--green); }
    tbody tr.status-ordered-shade td.status-cell { color: var(--orange); }
    tbody tr.status-received-shade td.status-cell { color: var(--green); }
    td {
      padding: 10px 10px;
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    td.thumb-cell { text-align: center; padding: 4px; }
    td.thumb-cell img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
      display: block;
      margin: auto;
    }
    .no-thumb {
      width: 40px;
      height: 40px;
      background: var(--surface3);
      border-radius: 4px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 18px;
    }
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-ordered { background: var(--orange-bg); color: var(--orange); }
    .badge-received { background: var(--green-bg); color: var(--green); }
    .empty-row td {
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
      font-size: 13px;
    }

    /* ── NOTES CELL ── */
    td.notes-cell {
      max-width: 160px;
      width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: default;
    }

    /* ── TOOLTIP ── */
    #row-tooltip {
      position: fixed;
      z-index: 999;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      max-width: 340px;
      white-space: pre-wrap;
      word-break: break-word;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
      display: none;
      line-height: 1.5;
    }

    /* ── RESIZER ── */
    .resizer {
      width: 4px;
      background: var(--border);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background .15s;
    }
    .resizer:hover { background: var(--accent); }

    /* ── FORM PANE ── */
    .form-pane {
      width: 380px;
      min-width: 280px;
      max-width: 600px;
      overflow-y: auto;
      border-left: 1px solid var(--border);
      padding: 16px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .form-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .form-title span { color: var(--accent); }
    .field-group { margin-bottom: 10px; }
    .field-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 4px;
    }
    .field-group input,
    .field-group select,
    .field-group textarea { width: 100%; }
    .field-group textarea { resize: vertical; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .row-qs { display: flex; gap: 20px; align-items: flex-start; }
    .row-qs > div { flex: 1; }

    .radio-group { display: flex; gap: 12px; margin-top: 2px; }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      color: var(--text);
      font-size: 13px;
    }
    .radio-group input[type=radio] { accent-color: var(--accent); width: auto; padding: 0; }

    .date-row { display: flex; gap: 6px; align-items: center; }
    .date-row input { flex: 1; }
    .date-row button { padding: 6px 10px; font-size: 11px; white-space: nowrap; }

    hr.form-sep { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

    /* ── PHOTO SECTION ── */
    .photo-list {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-height: 64px;
      max-height: 100px;
      overflow-y: auto;
      margin-bottom: 6px;
    }
    .photo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .photo-item:last-child { border-bottom: none; }
    .photo-item:hover { background: var(--surface3); }
    .photo-item.selected { background: var(--accent-dim); color: #fff; }
    .photo-empty { padding: 12px 8px; color: var(--text-muted); font-size: 12px; text-align: center; }
    .photo-btns { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    .photo-btns button { padding: 5px 10px; font-size: 12px; }

    /* ── ACTION BUTTONS ── */
    .action-btns { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
    .action-btns-row { display: flex; gap: 6px; }
    .action-btns-row button { flex: 1; }
    .action-btns .btn-accent { padding: 9px 14px; font-size: 13px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      max-width: 90vw;
      max-height: 90vh;
      overflow: auto;
    }
    .modal img {
      max-width: 80vw;
      max-height: 75vh;
      border-radius: 6px;
      display: block;
    }
    .modal-close {
      display: block;
      margin: 12px auto 0;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface3);
      color: var(--text);
      border: 1px solid var(--border-light);
      padding: 9px 18px;
      border-radius: 99px;
      font-size: 13px;
      z-index: 200;
      transition: transform .25s ease, opacity .25s;
      opacity: 0;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── MOBILE PANEL TOGGLE ── */
    @media (max-width: 768px) {
      .main { position: relative; }
      .form-pane {
        position: absolute;
        top: 0; right: 0; bottom: 0;
        width: 100%;
        max-width: 100%;
        z-index: 10;
        background: var(--bg);
        transform: translateX(100%);
        transition: transform .25s ease;
        border-left: none;
      }
      .form-pane.open { transform: translateX(0); }
      .resizer { display: none; }
      .mobile-fab {
        display: flex !important;
      }
    }
    .mobile-fab {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 24px;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(74,158,255,.4);
      z-index: 50;
      border: none;
      cursor: pointer;
    }
    .mobile-back-btn { display: none; }
    @media (max-width: 768px) {
      .mobile-back-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        background: none;
        border: none;
        color: var(--accent);
        font-size: 14px;
        cursor: pointer;
        padding: 0;
        margin-bottom: 14px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <span class="diamond">♦</span>
    <span>Parts Order Tracker</span>
  </div>
  <div class="header-controls">
    <label class="ctrl-label" for="search">Search:</label>
    <input id="search" type="search" placeholder="PO, part, mechanic…" style="width:180px" oninput="renderTable()" />
    <label class="ctrl-label" for="statusFilter">Status:</label>
    <select id="statusFilter" style="width:100px" onchange="renderTable()">
      <option value="All">All</option>
      <option value="Ordered">Ordered</option>
      <option value="Received">Received</option>
    </select>
    <button class="btn-default" onclick="exportXLSX()">⬇ Export XLS</button>
    <button class="btn-default" onclick="triggerImportXLSX()">⬆ Import XLS</button>
    <input type="file" id="xlsxImport" accept=".xlsx,.xls" style="display:none" onchange="importXLSX(event)" />
  </div>
</header>

<div class="main">
  <!-- TABLE -->
  <div class="table-pane" id="tablePane">
    <table id="ordersTable">
      <thead>
        <tr>
          <th>Photo</th>
          <th style="width:90px">PO #</th>
          <th style="width:110px">Mechanic</th>
          <th style="width:100px">Part #</th>
          <th style="width:200px">Description</th>
          <th style="width:50px">Qty</th>
          <th style="width:160px;max-width:160px">Notes</th>
          <th style="width:110px">Date Ordered</th>
          <th style="width:110px">Date Received</th>
          <th style="width:100px">Status</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="resizer" id="resizer"></div>

  <!-- FORM PANE -->
  <div class="form-pane" id="formPane">
    <button class="mobile-back-btn" onclick="closeMobileForm()">← Back to orders</button>

    <div class="form-title"><span>✎</span> Order Details</div>

    <div class="field-group">
      <label class="field-label">PO #</label>
      <input id="f_po" type="text" placeholder="PO number" />
    </div>
    <div class="field-group">
      <label class="field-label">Mechanic</label>
      <input id="f_mechanic" type="text" placeholder="Mechanic name" list="mechanicList" />
      <datalist id="mechanicList"></datalist>
    </div>
    <div class="field-group">
      <label class="field-label">Part #</label>
      <input id="f_partnum" type="text" placeholder="Part number" />
    </div>
    <div class="field-group">
      <label class="field-label">Description</label>
      <textarea id="f_desc" rows="2" placeholder="Part description"></textarea>
    </div>

    <div class="row-qs">
      <div class="field-group">
        <label class="field-label">Qty</label>
        <input id="f_qty" type="number" value="1" min="1" style="width:80px" />
      </div>
      <div class="field-group">
        <label class="field-label">Status</label>
        <div class="radio-group">
          <label><input type="radio" name="status" value="Ordered" checked /> Ordered</label>
          <label><input type="radio" name="status" value="Received" /> Received</label>
        </div>
      </div>
    </div>

    <div class="row-2">
      <div class="field-group">
        <label class="field-label">Date Ordered</label>
        <div class="date-row">
          <input id="f_date_ordered" type="text" placeholder="MM/DD/YYYY" />
          <button class="btn-default" onclick="setToday('f_date_ordered')">Today</button>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Date Received</label>
        <div class="date-row">
          <input id="f_date_received" type="text" placeholder="MM/DD/YYYY" />
          <button class="btn-default" onclick="setToday('f_date_received')">Today</button>
        </div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Notes</label>
      <textarea id="f_notes" rows="3" placeholder="Additional notes"></textarea>
    </div>

    <hr class="form-sep" />

    <div class="field-group">
      <label class="field-label">Nameplate Photos</label>
      <div class="photo-list" id="np_list"></div>
      <div class="photo-btns">
        <button class="btn-default" onclick="addPhoto('np')">+ Add</button>
        <button class="btn-default" onclick="viewSelectedPhoto('np')">View</button>
        <button class="btn-default" onclick="removeSelectedPhoto('np')">Remove</button>
        <button class="btn-danger" onclick="clearPhotos('np')">Clear All</button>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Part Photos</label>
      <div class="photo-list" id="pp_list"></div>
      <div class="photo-btns">
        <button class="btn-default" onclick="addPhoto('pp')">+ Add</button>
        <button class="btn-default" onclick="viewSelectedPhoto('pp')">View</button>
        <button class="btn-default" onclick="removeSelectedPhoto('pp')">Remove</button>
        <button class="btn-danger" onclick="clearPhotos('pp')">Clear All</button>
      </div>
    </div>

    <hr class="form-sep" />

    <div class="action-btns">
      <button class="btn-accent" onclick="saveNew()">💾 Save New Order</button>
      <div class="action-btns-row">
        <button class="btn-add" onclick="addPartToPO()">+ Add Part to PO</button>
        <button class="btn-success" onclick="updateOrder()">✔ Update</button>
      </div>
      <div class="action-btns-row">
        <button class="btn-success" onclick="markReceived()">📦 Mark Received</button>
        <button class="btn-danger" onclick="deleteOrder()">🗑 Delete</button>
      </div>
      <button class="btn-default" onclick="clearForm()">✕ Clear Form</button>
    </div>
  </div>
</div>

<!-- Mobile FAB -->
<button class="mobile-fab" onclick="openMobileForm()" title="New Order">+</button>

<!-- Row tooltip -->
<div id="row-tooltip"></div>

<!-- Photo viewer modal -->
<div class="modal-overlay" id="photoModal" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <img id="modalImg" src="" alt="Photo" />
    <button class="btn-default modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<!-- Hidden file input for photos -->
<input type="file" id="photoInput" accept="image/*" multiple style="display:none" />

<!-- Toast -->
<div id="toast"></div>

<script>
// ── DATA LAYER ──
const STORAGE_KEY = 'parts_orders_v2';
const FIELDS = ['order_id','po_number','mechanic','part_number','description','qty','status','date_ordered','date_received','nameplate_photos','part_photos','notes'];

function loadOrders() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveOrders(orders) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
}
function getNextId(orders) {
  if (!orders.length) return 1;
  return Math.max(...orders.map(o => parseInt(o.order_id) || 0)) + 1;
}

// ── STATE ──
let orders = loadOrders();
let selectedId = null;
let npPhotos = []; // [{name, dataUrl}]
let ppPhotos = [];
let selectedNpIdx = -1;
let selectedPpIdx = -1;
let currentPhotoTarget = null;

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  setToday('f_date_ordered');
  renderTable();
  initResizer();
  // hook photo file input
  document.getElementById('photoInput').addEventListener('change', onPhotoFilesChosen);
});

// ── UTILS ──
function stripTime(val) {
  if (!val) return '';
  // If it came in as "2025-02-19 00:00:00" or "2025-02-19T00:00:00" strip the time
  const m = String(val).match(/^(\d{4}-\d{2}-\d{2})/);
  if (m) {
    const [y, mo, d] = m[1].split('-');
    return `${mo}/${d}/${y}`;
  }
  return val;
}

// ── TABLE ──
function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const statusFilter = document.getElementById('statusFilter').value;
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  let filtered = orders.filter(o => {
    if (statusFilter !== 'All' && o.status !== statusFilter) return false;
    if (search) {
      const hay = [o.po_number, o.mechanic, o.part_number, o.description, o.notes].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  // Sort by PO then ID
  filtered.sort((a, b) => {
    if (a.po_number < b.po_number) return -1;
    if (a.po_number > b.po_number) return 1;
    return parseInt(a.order_id) - parseInt(b.order_id);
  });

  // Count per PO
  const poCounts = {};
  filtered.forEach(o => poCounts[o.po_number] = (poCounts[o.po_number] || 0) + 1);
  const poSeen = {};

  if (!filtered.length) {
    const tr = document.createElement('tr');
    tr.className = 'empty-row';
    tr.innerHTML = `<td colspan="10">No orders yet — fill out the form to add one.</td>`;
    tbody.appendChild(tr);
    return;
  }

  filtered.forEach(order => {
    const isFirst = !(order.po_number in poSeen);
    const isMulti = (poCounts[order.po_number] || 1) > 1;
    poSeen[order.po_number] = (poSeen[order.po_number] || 0) + 1;

    const status = (order.status || 'Ordered').toLowerCase();
    let rowClass = `status-${status}`;
    if (isMulti && !isFirst) rowClass += ' group-shade';
    if (order.order_id === selectedId) rowClass += ' selected';

    const thumb = buildThumb(order);
    const displayPo   = (isMulti && !isFirst) ? '' : escHtml(order.po_number || '');
    const displayMech = (isMulti && !isFirst) ? '' : escHtml(order.mechanic || '');
    const displayDate = (isMulti && !isFirst) ? '' : escHtml(stripTime(order.date_ordered || ''));
    const displayDateRcv = escHtml(stripTime(order.date_received || ''));

    const badgeClass = status === 'received' ? 'badge-received' : 'badge-ordered';
    const statusLabel = order.status || 'Ordered';

    const tr = document.createElement('tr');
    tr.className = rowClass;
    tr.dataset.id = order.order_id;
    tr.innerHTML = `
      <td class="thumb-cell">${thumb}</td>
      <td>${displayPo}</td>
      <td>${displayMech}</td>
      <td>${escHtml(order.part_number || '')}</td>
      <td title="${escHtml(order.description || '')}">${escHtml(order.description || '')}</td>
      <td>${escHtml(order.qty || '')}</td>
      <td class="notes-cell" data-notes="${escHtml(order.notes || '')}">${escHtml(order.notes || '')}</td>
      <td>${displayDate}</td>
      <td>${displayDateRcv}</td>
      <td><span class="status-badge ${badgeClass}">${escHtml(statusLabel)}</span></td>
    `;
    tr.addEventListener('click', () => selectOrder(order.order_id));
    tbody.appendChild(tr);
  });
}

function buildThumb(order) {
  for (const field of ['part_photos', 'nameplate_photos']) {
    const photos = order[field] || [];
    if (photos.length && photos[0] && photos[0].dataUrl) {
      return `<img src="${photos[0].dataUrl}" alt="thumb" />`;
    }
  }
  return `<div class="no-thumb">📷</div>`;
}

function selectOrder(id) {
  selectedId = id;
  const order = orders.find(o => o.order_id === id);
  if (!order) return;
  loadFormFromOrder(order);
  renderTable();
  openMobileForm();
}

function loadFormFromOrder(order) {
  document.getElementById('f_po').value        = order.po_number || '';
  document.getElementById('f_mechanic').value  = order.mechanic || '';
  document.getElementById('f_partnum').value   = order.part_number || '';
  document.getElementById('f_desc').value      = order.description || '';
  document.getElementById('f_qty').value       = order.qty || 1;
  document.getElementById('f_date_ordered').value  = order.date_ordered || '';
  document.getElementById('f_date_received').value = order.date_received || '';
  document.getElementById('f_notes').value     = order.notes || '';
  const statusVal = order.status || 'Ordered';
  document.querySelectorAll('input[name=status]').forEach(r => r.checked = r.value === statusVal);
  npPhotos = Array.isArray(order.nameplate_photos) ? [...order.nameplate_photos] : [];
  ppPhotos = Array.isArray(order.part_photos) ? [...order.part_photos] : [];
  selectedNpIdx = -1;
  selectedPpIdx = -1;
  renderPhotoList('np');
  renderPhotoList('pp');
}

// ── FORM HELPERS ──
function getFormData() {
  return {
    po_number:    document.getElementById('f_po').value.trim(),
    mechanic:     document.getElementById('f_mechanic').value.trim(),
    part_number:  document.getElementById('f_partnum').value.trim(),
    description:  document.getElementById('f_desc').value.trim(),
    qty:          document.getElementById('f_qty').value.trim(),
    status:       document.querySelector('input[name=status]:checked').value,
    date_ordered: document.getElementById('f_date_ordered').value.trim(),
    date_received:document.getElementById('f_date_received').value.trim(),
    notes:        document.getElementById('f_notes').value.trim(),
  };
}

function validateForm(data) {
  if (!data.po_number)   { toast('PO # is required'); return false; }
  if (!data.part_number) { toast('Part # is required'); return false; }
  if (!data.mechanic)    { toast('Mechanic name is required'); return false; }
  return true;
}

function setToday(id) {
  const now = new Date();
  document.getElementById(id).value =
    `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}/${now.getFullYear()}`;
}

// ── CRUD ──
function saveNew() {
  const data = getFormData();
  if (!validateForm(data)) return;
  data.order_id = String(getNextId(orders));
  data.nameplate_photos = [...npPhotos];
  data.part_photos      = [...ppPhotos];
  orders.push(data);
  saveOrders(orders);
  updateMechanicList();
  renderTable();
  clearForm();
  toast(`Order ${data.po_number} saved ✔`);
  closeMobileForm();
}

function addPartToPO() {
  const po = document.getElementById('f_po').value.trim();
  if (!po) { toast('Enter a PO # first'); return; }
  const partnum = document.getElementById('f_partnum').value.trim();
  if (!partnum) { toast('Enter a Part # for the new part'); return; }
  const data = getFormData();
  if (!data.mechanic) { toast('Mechanic name is required'); return; }
  data.order_id = String(getNextId(orders));
  data.nameplate_photos = [...npPhotos];
  data.part_photos      = [...ppPhotos];
  orders.push(data);
  saveOrders(orders);
  updateMechanicList();
  // clear only part fields
  document.getElementById('f_partnum').value = '';
  document.getElementById('f_desc').value = '';
  document.getElementById('f_qty').value = 1;
  npPhotos = []; ppPhotos = [];
  selectedNpIdx = -1; selectedPpIdx = -1;
  renderPhotoList('np'); renderPhotoList('pp');
  selectedId = null;
  renderTable();
  toast(`Part added to PO ${po} ✔`);
}

function updateOrder() {
  if (!selectedId) { toast('Select an order first'); return; }
  const data = getFormData();
  if (!validateForm(data)) return;
  const idx = orders.findIndex(o => o.order_id === selectedId);
  if (idx < 0) return;
  data.order_id = selectedId;
  data.nameplate_photos = [...npPhotos];
  data.part_photos      = [...ppPhotos];
  orders[idx] = data;
  saveOrders(orders);
  updateMechanicList();
  renderTable();
  toast(`Order ${data.po_number} updated ✔`);
}

function markReceived() {
  if (!selectedId) { toast('Select an order first'); return; }
  const order = orders.find(o => o.order_id === selectedId);
  if (!order) return;
  order.status = 'Received';
  const now = new Date();
  order.date_received = `${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}/${now.getFullYear()}`;
  document.querySelector('input[name=status][value=Received]').checked = true;
  document.getElementById('f_date_received').value = order.date_received;
  saveOrders(orders);
  renderTable();
  toast('Order marked as Received ✔');
}

function deleteOrder() {
  if (!selectedId) { toast('Select an order first'); return; }
  if (!confirm('Delete this part entry?')) return;
  orders = orders.filter(o => o.order_id !== selectedId);
  selectedId = null;
  saveOrders(orders);
  clearForm();
  renderTable();
  toast('Part deleted');
  closeMobileForm();
}

function clearForm() {
  selectedId = null;
  document.getElementById('f_po').value = '';
  document.getElementById('f_mechanic').value = '';
  document.getElementById('f_partnum').value = '';
  document.getElementById('f_desc').value = '';
  document.getElementById('f_qty').value = 1;
  document.querySelector('input[name=status][value=Ordered]').checked = true;
  setToday('f_date_ordered');
  document.getElementById('f_date_received').value = '';
  document.getElementById('f_notes').value = '';
  npPhotos = []; ppPhotos = [];
  selectedNpIdx = -1; selectedPpIdx = -1;
  renderPhotoList('np'); renderPhotoList('pp');
  renderTable();
}

function updateMechanicList() {
  const mechanics = [...new Set(orders.map(o => o.mechanic).filter(Boolean))].sort();
  const dl = document.getElementById('mechanicList');
  dl.innerHTML = mechanics.map(m => `<option value="${escHtml(m)}">`).join('');
}

// ── PHOTOS ──
function addPhoto(target) {
  currentPhotoTarget = target;
  const inp = document.getElementById('photoInput');
  inp.value = '';
  inp.click();
}

function onPhotoFilesChosen(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  const target = currentPhotoTarget;
  const arr = target === 'np' ? npPhotos : ppPhotos;
  let done = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      arr.push({ name: file.name, dataUrl: ev.target.result });
      done++;
      if (done === files.length) renderPhotoList(target);
    };
    reader.readAsDataURL(file);
  });
}

function renderPhotoList(target) {
  const arr = target === 'np' ? npPhotos : ppPhotos;
  const selIdx = target === 'np' ? selectedNpIdx : selectedPpIdx;
  const el = document.getElementById(`${target}_list`);
  if (!arr.length) {
    el.innerHTML = `<div class="photo-empty">No photos added</div>`;
    return;
  }
  el.innerHTML = arr.map((p, i) =>
    `<div class="photo-item ${i === selIdx ? 'selected' : ''}" onclick="selectPhoto('${target}',${i})">${escHtml(p.name)}</div>`
  ).join('');
}

function selectPhoto(target, idx) {
  if (target === 'np') selectedNpIdx = idx;
  else selectedPpIdx = idx;
  renderPhotoList(target);
}

function viewSelectedPhoto(target) {
  const arr = target === 'np' ? npPhotos : ppPhotos;
  const idx = target === 'np' ? selectedNpIdx : selectedPpIdx;
  if (idx < 0 || !arr[idx]) { toast('Select a photo first'); return; }
  document.getElementById('modalImg').src = arr[idx].dataUrl;
  document.getElementById('photoModal').classList.add('open');
}

function removeSelectedPhoto(target) {
  const arr = target === 'np' ? npPhotos : ppPhotos;
  const idx = target === 'np' ? selectedNpIdx : selectedPpIdx;
  if (idx < 0 || !arr[idx]) { toast('Select a photo first'); return; }
  arr.splice(idx, 1);
  if (target === 'np') selectedNpIdx = -1; else selectedPpIdx = -1;
  renderPhotoList(target);
}

function clearPhotos(target) {
  if (target === 'np') { npPhotos = []; selectedNpIdx = -1; }
  else { ppPhotos = []; selectedPpIdx = -1; }
  renderPhotoList(target);
}

function closeModal() {
  document.getElementById('photoModal').classList.remove('open');
}

// ── XLSX EXPORT ──
function exportXLSX() {
  const exportFields = ['order_id','po_number','mechanic','part_number','description','qty','status','date_ordered','date_received','notes'];
  const headers = ['ID','PO #','Mechanic','Part #','Description','Qty','Status','Date Ordered','Date Received','Notes'];

  const rows = orders.map(o =>
    exportFields.map(f => {
      const val = o[f];
      if (Array.isArray(val)) return val.map(p => p.name).join(';');
      return val || '';
    })
  );

  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);

  // Column widths
  ws['!cols'] = [
    {wch:6},{wch:12},{wch:14},{wch:14},{wch:30},
    {wch:6},{wch:10},{wch:13},{wch:13},{wch:35}
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Parts Orders');
  XLSX.writeFile(wb, 'parts_orders.xlsx');
}

// ── XLSX IMPORT ──
function triggerImportXLSX() {
  document.getElementById('xlsxImport').click();
}

function importXLSX(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const wb = XLSX.read(ev.target.result, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

    if (!rows.length) { toast('Spreadsheet is empty'); return; }

    // Map header names to internal field names (flexible — handles both display and raw headers)
    const headerMap = {
      'id': 'order_id', 'order_id': 'order_id',
      'po #': 'po_number', 'po_number': 'po_number', 'po number': 'po_number',
      'mechanic': 'mechanic',
      'part #': 'part_number', 'part_number': 'part_number', 'part number': 'part_number',
      'description': 'description',
      'qty': 'qty', 'quantity': 'qty',
      'status': 'status',
      'date ordered': 'date_ordered', 'date_ordered': 'date_ordered',
      'date received': 'date_received', 'date_received': 'date_received',
      'notes': 'notes'
    };

    const imported = rows.map(row => {
      const obj = { nameplate_photos: [], part_photos: [] };
      Object.entries(row).forEach(([k, v]) => {
        const field = headerMap[k.toLowerCase().trim()];
        if (field) obj[field] = String(v);
      });
      return obj;
    }).filter(o => o.po_number || o.part_number);

    if (!imported.length) { toast('No valid rows found'); return; }
    if (!confirm(`Import ${imported.length} orders? This will merge with existing data.`)) return;

    const existingIds = new Set(orders.map(o => o.order_id));
    let added = 0;
    imported.forEach(o => {
      if (!o.order_id || !existingIds.has(o.order_id)) {
        if (!o.order_id) o.order_id = String(getNextId([...orders, ...imported.slice(0, added)]));
        orders.push(o);
        existingIds.add(o.order_id);
        added++;
      }
    });

    saveOrders(orders);
    updateMechanicList();
    renderTable();
    toast(`Imported ${added} new orders ✔`);
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

// ── NOTES TOOLTIP ──
(function() {
  const tip = document.getElementById('row-tooltip');
  let hideTimer;

  document.addEventListener('mouseover', e => {
    const cell = e.target.closest('td.notes-cell');
    if (!cell) return;
    const notes = cell.dataset.notes;
    if (!notes || notes.length < 20) return;
    clearTimeout(hideTimer);
    tip.textContent = notes;
    tip.style.display = 'block';
    positionTip(e);
  });

  document.addEventListener('mousemove', e => {
    if (tip.style.display === 'block') positionTip(e);
  });

  document.addEventListener('mouseout', e => {
    const cell = e.target.closest('td.notes-cell');
    if (!cell) return;
    hideTimer = setTimeout(() => { tip.style.display = 'none'; }, 80);
  });

  function positionTip(e) {
    const pad = 14;
    let x = e.clientX + pad;
    let y = e.clientY + pad;
    if (x + 360 > window.innerWidth) x = e.clientX - 360 - pad;
    if (y + 120 > window.innerHeight) y = e.clientY - 120 - pad;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  }
})();

// ── MOBILE PANEL ──
function openMobileForm() {
  document.getElementById('formPane').classList.add('open');
}
function closeMobileForm() {
  document.getElementById('formPane').classList.remove('open');
}

// ── RESIZER ──
function initResizer() {
  const resizer = document.getElementById('resizer');
  const formPane = document.getElementById('formPane');
  let startX, startW;
  resizer.addEventListener('mousedown', e => {
    startX = e.clientX;
    startW = formPane.offsetWidth;
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', () => document.removeEventListener('mousemove', onMouseMove), {once:true});
  });
  function onMouseMove(e) {
    const delta = startX - e.clientX;
    const newW = Math.max(280, Math.min(600, startW + delta));
    formPane.style.width = newW + 'px';
  }
}

// ── UTILS ──
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}
</script>
